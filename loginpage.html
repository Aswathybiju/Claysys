<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <div style="width: 300px; margin: auto; padding: 40px; border: 1px solid #ccc; border-radius: 10px;">
        <h2 style="text-align: center;background-color: #df5bb3; padding:30px; border-radius: 5px; font-size: 16px;">Login Form</h2>
        <form>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required style="width: 100%; padding: 8px;border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="checkbox" id="remember" name="remember">
                <label>Remember me</label>
            </div>
            <div style="margin-bottom: 15px; text-align: right;">
                <a href="#" style="color: blue; ">Forgot password?</a>
            </div>
            <button type="submit" style="width: 100%; padding: 10px; border: none; background-color: #df5bb3; color: white; border-radius: 5px; font-size: 16px;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Not a member? <a href="#" style="color: blue; ">Sign up now</a>
        </p>
    </div>
</body>
</html>
